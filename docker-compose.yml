# 1. Tách cấu hình Environment ra một Anchor riêng
x-kafka-env: &kafka-env
  KAFKA_CLUSTER_ID: "6db71891-766b-4e46-9963-36691459a99c"
  KAFKA_PROCESS_ROLES: "broker,controller"
  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true" # Để true cho tiện dev, sau này tắt sau
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"

  KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m" # Giới hạn heap để không tràn RAM VM
  # --- RETENTION BY TIME (Theo thời gian) ---
  KAFKA_LOG_RETENTION_HOURS: 168 # Mặc định là 168 giờ (7 ngày)

  # --- RETENTION BY SIZE (Theo dung lượng) ---
  KAFKA_LOG_RETENTION_BYTES: 1073741824 # 1GB (Topic vượt quá 1GB sẽ tự xóa data cũ)
  KAFKA_LOG_DIRS: "/var/lib/kafka/data"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_MIN_INSYNC_REPLICAS: 2
# 2. Template chung cho Service
x-kafka-common: &kafka-common
  image: apache/kafka:3.7.0
  networks:
    - comment-toxic
  deploy:
    resources:
      limits:
        memory: 1G # Tăng lên 1G để chạy ổn định hơn trên Cloud

services:
  kafka-1:
    env_file:
      - .env
    <<: *kafka-common
    container_name: kafka-1
    hostname: kafka-1
    ports:
      - "9092:9092" # Port cho Cloud/Local Laptop
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: "INTERNAL://:29092,CONTROLLER://kafka-1:9093,EXTERNAL://0.0.0.0:9092"
      # QUAN TRỌNG: EXTERNAL trỏ về IP Public của Azure
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-1:29092,EXTERNAL://${KAFKA_ADVERTISED_LISTENERS}:9092"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
  kafka-2:
    env_file:
      - .env
    <<: *kafka-common
    container_name: kafka-2
    hostname: kafka-2
    ports:
      - "9094:9094" # Port cho Cloud/Local Laptop
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: "INTERNAL://:29092,CONTROLLER://kafka-2:9093,EXTERNAL://0.0.0.0:9094"
      # QUAN TRỌNG: EXTERNAL trỏ về IP Public của Azure
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-2:29092,EXTERNAL://${KAFKA_ADVERTISED_LISTENERS}:9094"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
  kafka-3:
    env_file:
      - .env
    <<: *kafka-common
    container_name: kafka-3
    hostname: kafka-3
    ports:
      - "9096:9096" # Port cho Cloud/Local Laptop
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: "INTERNAL://:29092,CONTROLLER://kafka-3:9093,EXTERNAL://0.0.0.0:9096"
      # QUAN TRỌNG: EXTERNAL trỏ về IP Public của Azure
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-3:29092,EXTERNAL://${KAFKA_ADVERTISED_LISTENERS}:9096"
    volumes:
      - kafka-3-data:/var/lib/kafka/data
  model-api:
    build: ./spark_app
    container_name: toxic-model-api
    environment:
      - SPARK_MASTER=local[2]
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:29092,kafka-2:29092,kafka-3:29092
    networks:
      - comment-toxic
    ports:
      - "4040:4040"
      - "8000:8000"
    volumes:
      - ./spark_app:/opt/spark_app
      - ./model:/opt/model
    entrypoint: ["/bin/bash", "/opt/spark_app/entrypoint.sh"]
    deploy:
      resources:
        limits:
          memory:
            5G
            # =========================
  # 2. REDIS
  # =========================
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - comment-toxic
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
networks:
  comment-toxic:
    name: comment-toxic
    driver: bridge

volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
  redis-data:
